<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TaskManager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Register</h1>
        <p>Create your account</p>
      </div>
      <form id="register-form">
        <!-- Company/Organization Info -->
        <div class="form-group">
          <label for="tenant_name">Company Name</label>
          <input type="text" id="tenant_name" name="tenant_name" required placeholder="Enter your company name">
        </div>
        <div class="form-group">
          <label for="subdomain">Subdomain</label>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="text" id="subdomain" name="subdomain" required placeholder="your-company" style="flex: 1;">
            <span style="color: var(--text-secondary);">.taskmanager.com</span>
          </div>
          <small style="color: var(--text-secondary); font-size: 0.85rem;">
            Only lowercase letters, numbers, and hyphens allowed
          </small>
        </div>
        
        <!-- User Info -->
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
          <div class="password-strength">
            <div class="strength-bar"></div>
            <div class="strength-text">Password strength</div>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
  <script src="authService.js"></script>
  <script src="register.js"></script>
</body>
</html>

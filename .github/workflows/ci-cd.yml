name: CI/CD Pipeline

on:
  push:
    branches: [ main, v2.0, develop ]
  pull_request:
    branches: [ main, v2.0 ]

jobs:
  # Backend Tests
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./src/backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint || true

    - name: Run tests with coverage
      run: npm test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./src/backend/coverage/lcov.info
        flags: backend
        name: backend-node-${{ matrix.node-version }}

  # Frontend Tests
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./src/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run frontend tests
      run: npm test || true

  # Integration Tests
  test-integration:
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install backend dependencies
      working-directory: ./src/backend
      run: npm ci

    - name: Start backend server
      working-directory: ./src/backend
      run: |
        npm start &
        sleep 3

    - name: Test API health
      run: |
        curl -f http://localhost:3000/health || exit 1

    - name: Test API endpoints
      run: |
        # Test GET /api/tasks
        curl -f http://localhost:3000/api/tasks || exit 1
        
        # Test POST /api/tasks
        curl -X POST http://localhost:3000/api/tasks \
          -H "Content-Type: application/json" \
          -d '{"title":"CI Test Task","status":"pending","tags":["ci","test"]}' \
          || exit 1

  # Build Docker Images
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2.0')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      run: |
        docker build -f Dockerfile.backend -t taskmanager-backend:latest .

    - name: Build frontend Docker image
      run: |
        docker build -f Dockerfile.frontend -t taskmanager-frontend:latest .

    - name: Test Docker Compose
      run: |
        docker-compose config

  # Deploy to Production (main branch only)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-integration, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
        # Example: SSH to server and run docker-compose up -d

  # Deploy to Staging (v2.0 branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/v2.0' && github.event_name == 'push'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging..."
        # Add your staging deployment commands here
